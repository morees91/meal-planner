<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Meal Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#6C63FF;--accent2:#9B8DFF;--accent-bg:#EEF0FF;--accent-text:#3730A3;
  --bg:#F8F7FF;--card:#fff;--card2:#F3F2FF;
  --text:#14102A;--text2:#6E6A8A;--text3:#B0ACCC;
  --border:#E8E6F5;--border2:#D4D1EE;
  --teal:#10B981;--teal-bg:#D1FAE5;--teal-text:#065F46;
  --amber:#F59E0B;--amber-bg:#FEF3C7;--amber-text:#92400E;
  --red:#EF4444;--red-bg:#FEE2E2;--red-text:#991B1B;
  --shadow:0 2px 12px rgba(108,99,255,.10);
  --shadow-md:0 4px 24px rgba(108,99,255,.15);
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
}
.theme-green{--accent:#10B981;--accent2:#34D399;--accent-bg:#D1FAE5;--accent-text:#065F46}
.theme-orange{--accent:#F97316;--accent2:#FB923C;--accent-bg:#FEF0E7;--accent-text:#9A3412}
.theme-pink{--accent:#EC4899;--accent2:#F472B6;--accent-bg:#FCE7F3;--accent-text:#9D174D}
.theme-blue{--accent:#3B82F6;--accent2:#60A5FA;--accent-bg:#EFF6FF;--accent-text:#1D40AF}
.dark-mode{
  --bg:#0F0E1A;--card:#1C1B2E;--card2:#252440;
  --text:#F0EFFF;--text2:#9E9BBF;--text3:#5C5980;
  --border:#2E2B4A;--border2:#3E3A5E;
  --accent-bg:#1E1D3A;--accent-text:#A5A3FF;
  --teal-bg:#022C22;--teal-text:#34D399;
  --amber-bg:#2D1F06;--amber-text:#FCD34D;
  --red-bg:#2D0A0A;--red-text:#FCA5A5;
  --shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow-md:0 4px 24px rgba(0,0,0,.4);
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:16px;overflow-x:hidden;transition:background .3s,color .3s}
.shell{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);padding:env(safe-area-inset-top,0) 1.1rem 0;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:background .3s}
.header-inner{padding-top:1rem}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;gap:6px}
.app-brand{display:flex;align-items:center;gap:9px}
.app-icon{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(8px)}
.app-title{font-size:19px;font-weight:700;color:#fff;letter-spacing:-.3px}
.header-actions{display:flex;gap:6px;align-items:center}
.icon-btn{background:rgba(255,255,255,.18);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;transition:background .2s;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,.28)}
.streak-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px}
.lang-switcher{display:flex;gap:3px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px}
.lang-btn{background:none;border:none;border-radius:16px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.75);font-family:'Inter',sans-serif;transition:all .2s}
.lang-btn.active{background:#fff;color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;background:none;border:none;border-bottom:3px solid transparent;padding:9px 10px;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.6);font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap;margin-bottom:-1px}
.tab.active{color:#fff;border-bottom-color:#fff}

/* CONTENT */
.content{flex:1;padding:1.1rem .9rem;overflow-y:auto}
.sec{display:none;animation:fadeIn .2s ease}.sec.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARDS & BUTTONS */
.card{background:var(--card);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:1rem}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.btn{padding:10px 14px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.btn.primary{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.btn.primary:hover{opacity:.9;transform:translateY(-1px)}
.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn.secondary:hover{border-color:var(--accent);color:var(--accent-text)}
.btn.ghost{background:none;color:var(--text2);border:1px solid var(--border);padding:7px 11px}
.btn.ghost:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.btn.teal{background:var(--teal);color:#fff}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:var(--radius-xs)}
.btn.danger{background:var(--red-bg);color:var(--red)}
.btn.danger:hover{background:var(--red);color:#fff}

/* FOODS TAB */
.add-row{display:flex;gap:8px;margin-bottom:4px}
.add-row input,.search-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:all .2s;min-width:0}
.add-row input:focus,.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.1)}
.add-row input.err{border-color:var(--red);background:var(--red-bg)}
.cat-select{padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;outline:none;cursor:pointer}
.cat-select:focus{border-color:var(--accent)}
.err-msg{font-size:12px;color:var(--red);margin-top:5px;min-height:14px;font-weight:500}
.search-wrap{position:relative;margin-bottom:10px}
.search-input{padding-left:34px;width:100%}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--text3);pointer-events:none}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px}
.food-count-badge{background:var(--accent-bg);color:var(--accent-text);font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
.food-list{display:flex;flex-direction:column;gap:7px}
.fi{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s;animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fi:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.fi-photo{width:40px;height:40px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer;border:2px solid var(--border)}
.fi-photo-placeholder{width:40px;height:40px;border-radius:10px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;cursor:pointer;border:2px dashed var(--border2);transition:border-color .2s}
.fi-photo-placeholder:hover{border-color:var(--accent)}
.fi-info{flex:1;min-width:0}
.fn{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-cat{font-size:11px;color:var(--text3);margin-top:1px}
.cat-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.empty-icon{font-size:44px;margin-bottom:10px;opacity:.5}
.empty-text{font-size:15px;font-weight:600}
.empty-sub{font-size:13px;color:var(--text3);margin-top:3px}
.data-row{display:flex;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);flex-wrap:wrap}

/* CALENDAR TAB */
.cal-card{background:var(--card);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:.75rem}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.nav-btn{background:var(--card2);border:none;border-radius:9px;cursor:pointer;color:var(--text2);padding:7px 13px;font-size:18px;line-height:1;transition:all .2s}
.nav-btn:hover{background:var(--accent-bg);color:var(--accent)}
.cal-title-row{display:flex;gap:2px}
.cal-title-btn{background:none;border:none;cursor:pointer;font-size:17px;font-weight:700;color:var(--text);padding:5px 7px;border-radius:var(--radius-xs);display:flex;align-items:center;gap:3px;font-family:'Inter',sans-serif;transition:background .2s}
.cal-title-btn:hover{background:var(--accent-bg);color:var(--accent-text)}
.cal-title-btn .arr{font-size:10px;color:var(--text3)}
.picker-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;box-shadow:var(--shadow);animation:fadeIn .15s ease}
.picker-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.picker-top span{font-size:13px;font-weight:600;color:var(--text2)}
.pg{display:grid;gap:5px}
.pg.months{grid-template-columns:repeat(3,1fr)}
.pg.years{grid-template-columns:repeat(4,1fr)}
.pi{padding:8px 4px;text-align:center;font-size:13px;font-weight:500;border-radius:var(--radius-xs);cursor:pointer;border:1.5px solid transparent;color:var(--text);transition:all .15s}
.pi:hover{background:var(--accent-bg);color:var(--accent-text)}
.pi.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.day-hdrs{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));margin-bottom:4px;width:100%}
.dh{font-size:10px;font-weight:700;color:var(--text3);text-align:center;padding:3px 0;text-transform:uppercase;letter-spacing:.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;width:100%}
.dc{min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:4px 2px 3px;cursor:pointer;border-radius:8px;border:1.5px solid transparent;position:relative;transition:all .15s;min-width:0;overflow:hidden}
.dc:hover{background:var(--accent-bg)}
.dc.other{opacity:.22}
.dc.today .dn{background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.dc.sel{border-color:var(--accent);background:var(--accent-bg)}
.dc.sel .dn{color:var(--accent-text);font-weight:700}
.dc.lk{border-color:var(--amber);border-width:2px}
.dc.lk.sel{border-color:var(--amber)}
.lock-icon{position:absolute;top:2px;right:2px;font-size:7px;line-height:1}
.dn{font-size:12px;font-weight:500;line-height:22px;color:var(--text);flex-shrink:0}
.dc.other .dn{color:var(--text3)}
.dc-label{font-size:9px;color:var(--text);width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;display:block;margin-top:2px;font-weight:600;line-height:1.3}
.dc.lk .dc-label{color:var(--amber-text);font-weight:700}
.dc.past-dim:not(.today){opacity:.5}
.has-note::after{content:'✏';position:absolute;bottom:2px;right:2px;font-size:7px;opacity:.6}

/* DETAIL PANEL */
.detail-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-top:10px;box-shadow:var(--shadow-md);animation:slideUp .25s cubic-bezier(.34,1.2,.64,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.det-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.det-title{font-size:14px;font-weight:600;flex:1;min-width:0;line-height:1.5;color:var(--text)}
.det-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.lk-btn{padding:6px 11px;font-size:12px;font-weight:600;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.lk-btn:hover,.lk-btn.on{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber)}
.close-btn{padding:6px 10px;font-size:15px;font-weight:700;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s}
.close-btn:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.det-food-card{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--accent-bg),var(--card2));border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1px solid rgba(108,99,255,.12)}
.det-food-img{width:52px;height:52px;border-radius:12px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.5);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.det-food-placeholder{width:52px;height:52px;border-radius:12px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.det-food-info{flex:1;min-width:0}
.det-food-label{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.det-food-name{font-size:16px;font-weight:700;margin-top:2px;word-break:break-word;color:var(--text)}
.note-area{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;font-family:'Inter',sans-serif;resize:none;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s;min-height:60px}
.note-area:focus{border-color:var(--accent)}
.pick-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.food-opts{display:flex;flex-wrap:wrap;gap:7px}
.fopt{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:7px}
.fopt:hover{border-color:var(--accent);color:var(--accent-text);background:var(--accent-bg);transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.fopt-img{width:26px;height:26px;border-radius:7px;object-fit:cover;flex-shrink:0}
.fopt-placeholder{width:26px;height:26px;border-radius:7px;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.note-note{font-size:12px;border-radius:var(--radius-xs);padding:9px 12px;margin-bottom:11px;font-weight:500}
.note-note.amber{color:var(--amber-text);background:var(--amber-bg);border:1px solid rgba(245,158,11,.2)}
.note-note.teal{color:var(--teal-text);background:var(--teal-bg);border:1px solid rgba(16,185,129,.2)}
.hint-bar{font-size:13px;font-weight:500;color:var(--text2);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xs);padding:9px 12px;margin-bottom:8px;display:none;text-align:center}

/* SHOPPING TAB */
.shop-week-label{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:500}
.shop-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:7px;transition:all .2s}
.shop-item.checked{opacity:.5}
.shop-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:12px}
.shop-item.checked .shop-check{background:var(--teal);border-color:var(--teal);color:#fff}
.shop-name{flex:1;font-size:14px;font-weight:500}
.shop-item.checked .shop-name{text-decoration:line-through;color:var(--text3)}
.shop-meal{font-size:11px;color:var(--text3)}
.shop-empty{text-align:center;padding:2rem;color:var(--text3);font-size:14px}
.shop-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}

/* SETTINGS TAB */
.settings-section{margin-bottom:1.25rem}
.settings-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.theme-row{display:flex;gap:10px;flex-wrap:wrap}
.theme-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative}
.theme-dot.active{border-color:var(--text);transform:scale(1.15)}
.theme-dot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.toggle-label{font-size:14px;font-weight:500}
.toggle-sub{font-size:12px;color:var(--text3);margin-top:2px}
.toggle{width:46px;height:26px;background:var(--border2);border-radius:20px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(20px)}

/* HELP TAB */
.help-hero{text-align:center;padding:1.5rem 1rem 1.25rem;background:linear-gradient(135deg,var(--accent-bg),var(--card));border-radius:var(--radius);border:1px solid var(--border);margin-bottom:1.1rem;box-shadow:var(--shadow)}
.help-hero-icon{font-size:44px;margin-bottom:9px}
.help-hero-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:5px}
.help-hero-sub{font-size:13px;color:var(--text2)}
.help-step{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:10px;box-shadow:var(--shadow)}
.help-step-header{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.help-step-num{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.help-step-title{font-size:14px;font-weight:700;color:var(--text)}
.help-step-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:9px}
.help-tips{display:flex;flex-direction:column;gap:6px}
.help-tip{display:flex;align-items:flex-start;gap:8px;background:var(--bg);border-radius:var(--radius-xs);padding:8px 10px}
.help-tip-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;margin-top:5px;flex-shrink:0}
.help-tip-text{font-size:13px;color:var(--text2);line-height:1.5}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1829;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s cubic-bezier(.34,1.4,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* UNDO BAR */
.undo-bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1829;color:#fff;padding:10px 8px 10px 18px;border-radius:30px;font-size:13px;font-weight:500;z-index:998;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .3s;pointer-events:none}
.undo-bar.show{opacity:1;pointer-events:all}
.undo-btn{background:var(--accent);border:none;border-radius:20px;color:#fff;font-size:12px;font-weight:700;padding:5px 13px;cursor:pointer;font-family:'Inter',sans-serif}

/* INGREDIENTS */
.ing-section{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.ing-toggle{background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--accent);font-family:Inter,sans-serif;padding:2px 0;display:flex;align-items:center;gap:4px}
.ing-list-mini{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.ing-chip{font-size:11px;background:var(--accent-bg);color:var(--accent-text);border-radius:20px;padding:3px 9px;font-weight:500}
.ing-editor{background:var(--bg);border-radius:var(--radius-sm);padding:10px;margin-top:8px;border:1px solid var(--border)}
.ing-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.ing-row input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--card);color:var(--text);font-family:Inter,sans-serif;outline:none;min-width:0}
.ing-row input:focus{border-color:var(--accent)}
.ing-row input.qty{width:60px;flex:none}
.ing-row select{padding:7px 6px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--card);color:var(--text);font-family:Inter,sans-serif;outline:none;cursor:pointer}
.ing-row select:focus{border-color:var(--accent)}
.ing-add-row{display:flex;gap:6px;margin-top:4px}
.ing-add-row input{flex:2;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--card);color:var(--text);font-family:Inter,sans-serif;outline:none;min-width:0}
.ing-add-row input.qty{flex:0 0 58px}
.ing-add-row input:focus{border-color:var(--accent)}
.ing-add-row select{padding:7px 5px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--card);color:var(--text);font-family:Inter,sans-serif;outline:none}
.del-ing{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 2px;line-height:1;flex-shrink:0}
.del-ing:hover{color:var(--red)}
/* DETAIL INGREDIENTS */
.det-ingredients{background:var(--bg);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1px solid var(--border)}
.det-ing-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.det-ing-grid{display:flex;flex-wrap:wrap;gap:7px}
.det-ing-chip{font-size:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 11px;color:var(--text);font-weight:500;display:flex;align-items:center;gap:5px}
.det-ing-chip .qty{font-size:11px;color:var(--accent);font-weight:700;background:var(--accent-bg);border-radius:20px;padding:1px 6px}
.det-ing-empty{font-size:13px;color:var(--text3);font-style:italic}

/* GLOBAL INGREDIENTS TAB */
.ing-item{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:7px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.ing-item:hover{box-shadow:var(--shadow)}
.ing-item-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.ing-item-unit{font-size:12px;color:var(--text3);background:var(--accent-bg);padding:2px 8px;border-radius:20px;font-weight:500}
/* FOOD ASSIGN INGREDIENTS */
.food-ing-section{width:100%;margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.food-ing-toggle{background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--accent);font-family:Inter,sans-serif;padding:3px 0;display:flex;align-items:center;gap:5px;width:100%}
.food-ing-panel{margin-top:8px;background:var(--bg);border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border)}
.food-ing-assigned{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:10px}
.food-ing-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-bg);color:var(--accent-text);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
.food-ing-chip .chip-qty{font-size:11px;opacity:.75}
.food-ing-chip .chip-del{background:none;border:none;cursor:pointer;color:var(--accent-text);font-size:12px;padding:0;line-height:1;opacity:.7}
.food-ing-chip .chip-del:hover{opacity:1}
.food-ing-picker{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.food-ing-option{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);transition:all .15s}
.food-ing-option:hover{border-color:var(--accent);color:var(--accent-text);background:var(--accent-bg)}
.food-ing-option.assigned{display:none}
.food-ing-qty-row{display:flex;gap:6px;align-items:center}
.food-ing-qty-row input{flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--card);color:var(--text);font-family:Inter,sans-serif;outline:none;min-width:0}
.food-ing-qty-row input:focus{border-color:var(--accent)}
.no-ing-msg{font-size:13px;color:var(--text3);font-style:italic;padding:4px 0}

/* SHOPPING LIST REDESIGN */
.shop-food-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:all .2s}
.shop-food-card.all-done{opacity:.6}
.shop-food-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;transition:background .15s}
.shop-food-header:hover{background:var(--bg)}
.shop-food-info{flex:1;min-width:0}
.shop-food-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:1px}
.shop-food-day{font-size:12px;color:var(--text3);font-weight:500}
.shop-ing-badge{font-size:11px;font-weight:700;background:var(--accent-bg);color:var(--accent-text);padding:3px 8px;border-radius:20px}
.shop-ing-badge.done{background:var(--teal-bg);color:var(--teal-text)}
.shop-food-ings{padding:0 14px 12px;border-top:1px solid var(--border);display:block}
.shop-ing-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);transition:opacity .2s}
.shop-ing-row:last-child{border-bottom:none}
.shop-ing-row.checked{opacity:.45}
.shop-ing-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;transition:all .2s;color:#fff}
.shop-ing-row:not(.checked) .shop-ing-check{color:transparent}
.shop-ing-row.checked .shop-ing-check{background:var(--teal);border-color:var(--teal);color:#fff}
.shop-ing-name{flex:1;font-size:14px;font-weight:500;color:var(--text)}
.shop-ing-row.checked .shop-ing-name{text-decoration:line-through;color:var(--text3)}
.shop-ing-qty{font-size:12px;color:var(--accent-text);background:var(--accent-bg);border-radius:20px;padding:2px 8px;font-weight:600;flex-shrink:0}
.shop-no-ing{font-size:13px;color:var(--text3);font-style:italic;padding:8px 0}
.shop-empty{text-align:center;padding:2rem;color:var(--text3);font-size:14px}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-inner">
      <div class="header-top">
        <div class="app-brand">
          <div class="app-icon">🍽</div>
          <div class="app-title" id="t-title">Meal Planner</div>
        </div>
        <div class="header-actions">
          <div class="streak-badge" id="streak-badge" style="display:none">🔥 <span id="streak-num">0</span></div>
          <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('ar')">ع</button>
            <button class="lang-btn" onclick="setLang('he')">ע</button>
            <button class="lang-btn" onclick="setLang('ru')">РУ</button>
          </div>
          <button class="icon-btn" onclick="switchTab('settings')" title="Settings">⚙️</button>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('foods')"><span id="t-myfoods">My Foods</span> <span id="fc" style="font-size:11px;opacity:.7;margin-left:2px"></span></button>
        <button class="tab" onclick="switchTab('cal')"><span id="t-calendar">Calendar</span></button>
        <button class="tab" onclick="switchTab('ingredients')"><span id="t-ingredients">Ingredients</span></button>
        <button class="tab" onclick="switchTab('shop')"><span id="t-shop">Shopping</span></button>
        <button class="tab" onclick="switchTab('help')"><span id="t-help">Guide</span></button>
        <button class="tab" onclick="switchTab('settings')"><span id="t-settings">Settings</span></button>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- FOODS TAB -->
    <div class="sec active" id="tab-foods">
      <div class="card">
        <div class="card-title" id="t-add-label">Add New Food</div>
        <div class="add-row">
          <input type="text" id="food-input" maxlength="50" onkeydown="if(event.key==='Enter')addFood()"/>
<button class="btn primary sm" onclick="addFood()">+</button>
        </div>
        <div class="err-msg" id="food-err"></div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" id="search-input" oninput="renderFoods()" placeholder="Search foods..."/>
      </div>
      <div class="section-header">
        <span class="section-title" id="t-list-label">Your Foods</span>
        <span class="food-count-badge" id="fc2"></span>
      </div>
      <div class="food-list" id="food-list"></div>
      <div class="data-row">
        <button class="btn teal sm" onclick="exportData()">⬇ <span id="t-export">Export</span></button>
        <label class="btn secondary sm" style="cursor:pointer">⬆ <span id="t-import">Import</span><input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
      </div>
    </div>

    <!-- CALENDAR TAB -->
    <div class="sec" id="tab-cal">
      <div id="picker-area"></div>
      <div class="cal-card">
        <div class="cal-nav">
          <button class="nav-btn" onclick="shiftMonth(-1)">&#8249;</button>
          <div class="cal-title-row">
            <button class="cal-title-btn" onclick="togglePicker('month')"><span id="month-label"></span><span class="arr">▾</span></button>
            <button class="cal-title-btn" onclick="togglePicker('year')"><span id="year-label"></span><span class="arr">▾</span></button>
          </div>
          <button class="nav-btn" onclick="shiftMonth(1)">&#8250;</button>
        </div>
        <div class="day-hdrs" id="day-hdrs"></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <div class="cal-toolbar">
        <button class="btn secondary sm" onclick="goToday()">📅 <span id="t-today">Today</span></button>
        <button class="btn primary sm" onclick="randomizeMonth()">↺ <span id="t-randomize">Randomize</span></button>
      </div>
      <div class="hint-bar" id="hint-box"></div>
      <div id="detail-area"></div>
    </div>


    <!-- INGREDIENTS TAB -->
    <div class="sec" id="tab-ingredients">
      <div class="card">
        <div class="card-title" id="t-ing-add-label">Add Ingredient</div>
        <div class="add-row">
          <input type="text" id="ing-global-input" maxlength="50" onkeydown="if(event.key==='Enter')addGlobalIng()"/>
          <select id="ing-global-unit" style="padding:10px 8px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);font-family:Inter,sans-serif;outline:none">
            <option value="">— unit</option>
            <option value="g">g</option>
            <option value="kg">kg</option>
            <option value="ml">ml</option>
            <option value="l">l</option>
            <option value="cup">cup</option>
            <option value="tbsp">tbsp</option>
            <option value="tsp">tsp</option>
            <option value="pcs">pcs</option>
          </select>
          <button class="btn primary sm" onclick="addGlobalIng()">+</button>
        </div>
        <div class="err-msg" id="ing-err"></div>
      </div>
      <div class="section-header" style="margin-bottom:8px">
        <span class="section-title" id="t-ing-list-label">All Ingredients</span>
        <span class="food-count-badge" id="ing-count"></span>
      </div>
      <div id="ing-global-list"></div>
    </div>

    <!-- SHOPPING TAB -->
    <div class="sec" id="tab-shop">
      <div class="card">
        <div class="card-title" id="t-shop-title">Weekly Shopping List</div>
        <div class="shop-week-label" id="shop-week-label"></div>
        <div class="shop-actions">
          <button class="btn secondary sm" onclick="generateShoppingList()">↻ <span id="t-refresh-shop">Refresh</span></button>
          <button class="btn ghost sm" onclick="clearChecked()">✕ <span id="t-clear-checked">Clear checked</span></button>
        </div>
        <div id="shop-list"></div>
      </div>
    </div>

    <!-- HELP TAB -->
    <div class="sec" id="tab-help">
      <div class="help-hero">
        <div class="help-hero-icon">🍽</div>
        <div class="help-hero-title" id="t-help-title">How to use Meal Planner</div>
        <div class="help-hero-sub" id="t-help-sub">Everything you need to know</div>
      </div>
      <div id="help-steps"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div class="sec" id="tab-settings">
      <div class="card">
        <div class="settings-label" id="t-theme-label">Color Theme</div>
        <div class="theme-row">
          <div class="theme-dot active" style="background:linear-gradient(135deg,#6C63FF,#9B8DFF)" onclick="setTheme('purple')" id="td-purple" title="Purple"></div>
          <div class="theme-dot" style="background:linear-gradient(135deg,#10B981,#34D399)" onclick="setTheme('green')" id="td-green" title="Green"></div>
          <div class="theme-dot" style="background:linear-gradient(135deg,#F97316,#FB923C)" onclick="setTheme('orange')" id="td-orange" title="Orange"></div>
          <div class="theme-dot" style="background:linear-gradient(135deg,#EC4899,#F472B6)" onclick="setTheme('pink')" id="td-pink" title="Pink"></div>
          <div class="theme-dot" style="background:linear-gradient(135deg,#3B82F6,#60A5FA)" onclick="setTheme('blue')" id="td-blue" title="Blue"></div>
        </div>
      </div>
      <div class="card">
        <div class="settings-label" id="t-display-label">Display</div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label" id="t-dark-label">Dark Mode</div>
            <div class="toggle-sub" id="t-dark-sub">Switch to dark theme</div>
          </div>
          <button class="toggle" id="dark-toggle" onclick="toggleDark()"></button>
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label" id="t-streak-label">Show Streak</div>
            <div class="toggle-sub" id="t-streak-sub">Display planning streak in header</div>
          </div>
          <button class="toggle" id="streak-toggle" onclick="toggleStreakDisplay()"></button>
        </div>
      </div>
      <div class="card">
        <div class="settings-label" id="t-data-label">Data</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn teal sm" onclick="exportData()">⬇ Export</button>
          <label class="btn secondary sm" style="cursor:pointer">⬆ Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"/></label>
          <button class="btn danger sm" onclick="clearAllData()">🗑 Reset all</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="undo-bar" id="undo-bar"><span id="undo-msg">Day cleared</span><button class="undo-btn" onclick="doUndo()">Undo</button></div>

// ── SAFE STORAGE ──────────────────────────────────────────────
function safeGet(k,fb){try{const r=localStorage.getItem(k);return r===null?fb:JSON.parse(r);}catch{return fb;}}
function safeSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{showToast('⚠ Storage error');}}
function sanitize(s){return String(s).replace(/[<>"'&]/g,'').replace(/\s+/g,' ').trim();}
function validateGlobalIngs(a){if(!Array.isArray(a))return[];return a.filter(i=>i&&typeof i.id==='number'&&typeof i.name==='string'&&i.name.trim()).map(i=>({id:i.id,name:sanitize(i.name).slice(0,50),unit:typeof i.unit==='string'?i.unit:''}));}
function validateFoods(a){if(!Array.isArray(a))return[];return a.filter(f=>f&&typeof f.id==='number'&&typeof f.name==='string'&&f.name.trim()).map(f=>({id:f.id,name:sanitize(f.name).slice(0,50),photo:typeof f.photo==='string'?f.photo:'',ingredients:Array.isArray(f.ingredients)?f.ingredients.filter(i=>i&&typeof i.ingId==='number').map(i=>({ingId:i.ingId,name:typeof i.name==='string'?sanitize(i.name).slice(0,50):'',qty:sanitize(String(i.qty||'')).slice(0,20)})):[]}));}
function validateSchedule(o){if(!o||typeof o!=='object'||Array.isArray(o))return{};const r={};for(const k of Object.keys(o)){if(!/^\d{4}-\d{2}-\d{2}$/.test(k))continue;const v=o[k];if(v&&typeof v.id==='number'&&typeof v.name==='string')r[k]={id:v.id,name:sanitize(v.name).slice(0,50)};}return r;}
function validateLockMap(o){if(!o||typeof o!=='object'||Array.isArray(o))return{};const r={};for(const k of Object.keys(o)){if(/^\d{4}-\d{2}-\d{2}$/.test(k)&&o[k])r[k]=o[k];}return r;}
function validateNotes(o){if(!o||typeof o!=='object')return{};const r={};for(const k of Object.keys(o)){if(/^\d{4}-\d{2}-\d{2}$/.test(k)&&typeof o[k]==='string')r[k]=o[k].slice(0,200);}return r;}
function validateChecked(o){if(!o||typeof o!=='object')return{};const r={};for(const k of Object.keys(o)){if(typeof k==='string')r[k]=!!o[k];}return r;}
function cleanOrphans(){
  const ids=new Set(foods.map(f=>f.id));
  let ch=false;
  for(const k of Object.keys(schedule)){
    if(schedule[k]&&!ids.has(schedule[k].id)){
      delete schedule[k];delete manualLocked[k];delete manualUnlocked[k];ch=true;
    }
  }
  // deduplicate ingredients assigned to each food
  foods.forEach(f=>{
    if(!f.ingredients)return;
    const seen=new Set();
    f.ingredients=f.ingredients.filter(a=>{
      if(seen.has(a.ingId))return false;
      seen.add(a.ingId);return true;
    });
  });
  if(ch){saveSched();saveManual();}
}

function load(){
  lang=safeGet('mp_lang','en');if(!T[lang])lang='en';

  schedule=validateSchedule(safeGet('mp_schedule',{}));
  manualLocked=validateLockMap(safeGet('mp_mlocked',{}));

  notes=validateNotes(safeGet('mp_notes',{}));
  shopChecked=validateChecked(safeGet('mp_shopchecked',{}));
  globalIngredients=validateGlobalIngs(safeGet('mp_globalings',[]));

  document.getElementById('streak-toggle').classList.toggle('on',showStreak);
}

function saveSched(){safeSet('mp_schedule',schedule);}
function saveManual(){safeSet('mp_mlocked',manualLocked);safeSet('mp_munlocked',manualUnlocked);}

const themeClasses={purple:'',green:'theme-green',orange:'theme-orange',pink:'theme-pink',blue:'theme-blue'};
function applyTheme(){
  document.body.className=document.body.className.replace(/theme-\w+/g,'').trim();
  if(themeClasses[currentTheme])document.body.classList.add(themeClasses[currentTheme]);
  if(darkMode)document.body.classList.add('dark-mode');
  document.querySelectorAll('.theme-dot').forEach(d=>d.classList.remove('active'));
  const el=document.getElementById('td-'+currentTheme);if(el)el.classList.add('active');
}
function setTheme(theme){currentTheme=theme;safeSet('mp_theme',theme);applyTheme();}
function applyDark(){
  document.body.classList.toggle('dark-mode',darkMode);
  document.getElementById('dark-toggle').classList.toggle('on',darkMode);
}
function toggleDark(){darkMode=!darkMode;safeSet('mp_dark',darkMode);applyDark();}
function toggleStreakDisplay(){
  showStreak=!showStreak;safeSet('mp_streak',showStreak);
  document.getElementById('streak-toggle').classList.toggle('on',showStreak);
  updateStreak();
}

// ── STREAK ────────────────────────────────────────────────────
function updateStreak(){
  let streak=0;
  const d=new Date(now);
  while(true){
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(schedule[k]){streak++;d.setDate(d.getDate()-1);}else break;
    if(streak>365)break;
  }
  const badge=document.getElementById('streak-badge');
  document.getElementById('streak-num').textContent=streak;
  badge.style.display=showStreak&&streak>0?'flex':'none';
}

function isAutoLock(k){return k<=todayKey&&!!schedule[k];}
function isLocked(k){if(manualUnlocked[k])return false;if(manualLocked[k])return true;return isAutoLock(k);}

function showFoodErr(msg){
  const el=document.getElementById('food-err');el.textContent=msg;
  const inp=document.getElementById('food-input');inp.classList.add('err');
  clearTimeout(inp._t);inp._t=setTimeout(()=>{el.textContent='';inp.classList.remove('err');},2500);
}
function addFood(){
  const inp=document.getElementById('food-input');
  const name=sanitize(inp.value);if(!name){inp.focus();return;}
  if(name.length>50||!/^[\p{L}\s]+$/u.test(name)){showFoodErr(t('lettersOnly'));inp.value='';return;}
  if(foods.some(f=>f.name.toLowerCase()===name.toLowerCase())){showFoodErr(t('alreadyInList'));inp.value='';return;}
  foods.push({id:Date.now(),name,photo:'',ingredients:[]});
  inp.value='';document.getElementById('food-err').textContent='';inp.classList.remove('err');
  saveFoods();renderFoods();
}
function editFood(id){
  const f=foods.find(x=>x.id===id);if(!f)return;
  const row=document.getElementById('fi-'+id);if(!row)return;
  const nameDiv=row.querySelector('.fn');
  const editBtns=row.querySelector('.fi-edit-btns');
  const actionBtns=row.querySelector('.fi-action-btns');
  nameDiv.innerHTML=`<input id="edit-inp-${id}" type="text" value="${esc(f.name)}" maxlength="50" style="width:100%;padding:4px 7px;border:1.5px solid var(--accent);border-radius:6px;font-size:14px;font-weight:600;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);outline:none" onkeydown="if(event.key==='Enter')saveEdit(${id});if(event.key==='Escape')renderFoods()"/>`;

// ── CALENDAR ──────────────────────────────────────────────────
function dayKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function parseDayKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
const catDotClass={any:'any',breakfast:'breakfast',lunch:'lunch',dinner:'dinner',snack:'snack'};
function renderCal(){
  document.getElementById('month-label').textContent=t('months')[viewMonth];
  document.getElementById('year-label').textContent=viewYear;
  const grid=document.getElementById('cal-grid');
  const firstDay=new Date(viewYear,viewMonth,1).getDay();
  const dim=new Date(viewYear,viewMonth+1,0).getDate();
  const prevDays=new Date(viewYear,viewMonth,0).getDate();
  let cells='';
  function cell(k,d,other){
    const meal=schedule[k];const lk=isLocked(k);const isPast=k<=todayKey;
    const hasNote=!!notes[k];
    let cls='dc';
    if(other)cls+=' other';if(k===todayKey)cls+=' today';
    if(selDay===k)cls+=' sel';if(lk)cls+=' lk';else if(isPast&&!other)cls+=' past-dim';
    if(hasNote&&!other)cls+=' has-note';
    return `<div class="${cls}" onclick="clickDay('${k}')">
      <span class="dn">${d}</span>
      ${meal?`<span class="dc-label">${esc(meal.name)}</span>`:''}
      ${lk?`<span class="lock-icon">🔒</span>`:''}
    </div>`;
  }
  for(let i=0;i<firstDay;i++){const d=prevDays-firstDay+1+i;const pm=viewMonth===0?11:viewMonth-1,py=viewMonth===0?viewYear-1:viewYear;cells+=cell(dayKey(py,pm,d),d,true);}
  for(let d=1;d<=dim;d++)cells+=cell(dayKey(viewYear,viewMonth,d),d,false);
  const rem=42-(firstDay+dim);
  for(let d=1;d<=rem;d++){const nm=viewMonth===11?0:viewMonth+1,ny=viewMonth===11?viewYear+1:viewYear;cells+=cell(dayKey(ny,nm,d),d,true);}
  grid.innerHTML=cells;
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function randomizeMonth(){
  if(!foods.length){showHint(t('addFoodsHint'));return;}
  const days=new Date(viewYear,viewMonth+1,0).getDate();
  const unlocked=[];for(let d=1;d<=days;d++){const k=dayKey(viewYear,viewMonth,d);if(!isLocked(k))unlocked.push(k);}
  if(!unlocked.length){showHint(t('noUnlocked'));return;}
  clearHint();

  // seed lastUsed from locked days
  const lastUsed={};
  for(let d=1;d<=days;d++){
    const k=dayKey(viewYear,viewMonth,d);
    if(isLocked(k)&&schedule[k]) lastUsed[schedule[k].id]=d;
  }

  for(const k of unlocked){
    const d=parseInt(k.split('-')[2]);

    // Step 1: foods not used within 5 days
    let pool=foods.filter(f=>{
      const last=lastUsed[f.id];
      return last===undefined||Math.abs(d-last)>5;
    });

    // fallback — pick food with largest gap if all within 5 days
    if(!pool.length){
      pool=[...foods].sort((a,b)=>{
        const ga=lastUsed[a.id]===undefined?9999:Math.abs(d-lastUsed[a.id]);
        const gb=lastUsed[b.id]===undefined?9999:Math.abs(d-lastUsed[b.id]);
        return gb-ga;
      });
    }

    shuffle(pool);
    const picked=pool[0];
    schedule[k]={id:picked.id,name:picked.name};
    lastUsed[picked.id]=d;
  }
  saveSched();renderCal();updateStreak();if(selDay)showDetail(selDay);
}

// ── SHOPPING LIST ─────────────────────────────────────────────
function generateShoppingList(){
  const d=new Date(now);const dow=d.getDay();
  const sun=new Date(d);sun.setDate(d.getDate()-dow);
  const sat=new Date(sun);sat.setDate(sun.getDate()+6);
  const locale=lang==='ar'?'ar-SA':lang==='he'?'he-IL':lang==='ru'?'ru-RU':'en-GB';
  document.getElementById('shop-week-label').textContent=
    `${sun.toLocaleDateString(locale,{day:'numeric',month:'short'})} – ${sat.toLocaleDateString(locale,{day:'numeric',month:'short',year:'numeric'})}`;

  // collect days with meals this week
  const days=[];
  for(let i=0;i<7;i++){
    const dd=new Date(sun);dd.setDate(sun.getDate()+i);
    const k=dayKey(dd.getFullYear(),dd.getMonth(),dd.getDate());
    if(schedule[k]){
      const food=foods.find(f=>f.id===schedule[k].id);
      const dayName=dd.toLocaleDateString(locale,{weekday:'short',day:'numeric'});
      days.push({dayKey:k,dayName,food,mealName:schedule[k].name});
    }
  }

  const list=document.getElementById('shop-list');
  if(!days.length){list.innerHTML=`<div class="shop-empty">No meals scheduled this week</div>`;return;}

  list.innerHTML=days.map(day=>{
    const ings=day.food?day.food.ingredients||[]:[];
    // resolve ingredient names/units from global list
    const resolved=ings.map(a=>{
      const gi=globalIngredients.find(x=>x.id===a.ingId);
      return {ingId:a.ingId,name:gi?gi.name:a.name||'?',unit:gi?gi.unit:'',qty:a.qty||''};
    });

    const ingRows=resolved.length
      ?resolved.map(ing=>{
          const checkKey=`${day.dayKey}_${ing.ingId}`;
          const checked=!!shopChecked[checkKey];
          return `<div class="shop-ing-row${checked?' checked':''}" id="sir-${checkKey}">
            <div class="shop-ing-check" onclick="toggleIngCheck('${checkKey}')">${checked?'✓':''}</div>
            <span class="shop-ing-name">${esc(ing.name)}</span>
            ${ing.qty||ing.unit?`<span class="shop-ing-qty">${esc(ing.qty)}${ing.unit?' '+ing.unit:''}</span>`:''}
          </div>`;
        }).join('')
      :`<div class="shop-no-ing">No ingredients assigned to this food yet.</div>`;

    const allChecked=resolved.length>0&&resolved.every(ing=>shopChecked[`${day.dayKey}_${ing.ingId}`]);
    return `<div class="shop-food-card${allChecked?' all-done':''}">
      <div class="shop-food-header" onclick="toggleShopFood('sfb-${day.dayKey}','sfc-${day.dayKey}')">
        <div class="shop-food-info">
          <div class="shop-food-name">${esc(day.mealName)}</div>
          <div class="shop-food-day">${day.dayName}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          ${resolved.length?`<span class="shop-ing-badge${allChecked?' done':''}">${resolved.filter(ing=>shopChecked[`${day.dayKey}_${ing.ingId}`]).length}/${resolved.length}</span>`:''}
          <span id="sfb-${day.dayKey}" style="font-size:14px;color:var(--text3)">▾</span>
        </div>
      </div>
      <div class="shop-food-ings" id="sfc-${day.dayKey}" style="display:block">${ingRows}</div>
    </div>`;
  }).join('');
}
function toggleShopFood(arrowId,contentId){
  const content=document.getElementById(contentId);
  const arrow=document.getElementById(arrowId);
  if(!content)return;
  const open=content.style.display!=='none'&&content.style.display!=='';
  content.style.display=open?'none':'block';
  if(arrow)arrow.textContent=open?'▾':'▴';
}
function toggleIngCheck(checkKey){
  shopChecked[checkKey]=!shopChecked[checkKey];
  saveShop();

  // update just this row without re-rendering the whole list
  const row=document.getElementById('sir-'+checkKey);
  if(row){
    const checked=shopChecked[checkKey];
    row.classList.toggle('checked',checked);
    const checkEl=row.querySelector('.shop-ing-check');
    if(checkEl)checkEl.textContent=checked?'✓':'';
  }

  // dayKey is always first 10 chars (YYYY-MM-DD), rest is _ingId
  const dk=checkKey.substring(0,10);
  const card=document.querySelector(`[id="sfc-${dk}"]`);
  if(!card)return;
  const allRows=card.querySelectorAll('.shop-ing-row');
  const checkedRows=card.querySelectorAll('.shop-ing-row.checked');
  const total=allRows.length;const done=checkedRows.length;
  const badge=card.previousElementSibling?.querySelector('.shop-ing-badge');
  if(badge){
    badge.textContent=`${done}/${total}`;
    badge.classList.toggle('done',done===total&&total>0);
  }
  const foodCard=card.closest('.shop-food-card');
  if(foodCard)foodCard.classList.toggle('all-done',done===total&&total>0);
}
function toggleShopCheck(id){shopChecked[id]=!shopChecked[id];saveShop();generateShoppingList();}
function clearChecked(){
  // clear all ing checks
  for(const k of Object.keys(shopChecked))delete shopChecked[k];
  saveShop();generateShoppingList();
}

// ── HELP ──────────────────────────────────────────────────────
function renderHelp(){
  const steps=t('steps');if(!steps||!steps.length)return;
  document.getElementById('help-steps').innerHTML=steps.map(s=>`
    <div class="help-step">
      <div class="help-step-header"><div class="help-step-num">${s.icon}</div><div class="help-step-title">${s.title}</div></div>
      <div class="help-step-desc">${s.desc}</div>
      <div class="help-tips">${(s.tips||[]).map(tip=>`<div class="help-tip"><div class="help-tip-dot"></div><div class="help-tip-text">${tip}</div></div>`).join('')}</div>
    </div>`).join('');
}

// ── EXPORT / IMPORT / RESET ───────────────────────────────────
function exportData(){
  const data={version:2,foods,schedule,manualLocked,manualUnlocked,notes,globalIngredients,lang};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`meal-planner-${todayKey}.json`;a.click();URL.revokeObjectURL(a.href);showToast(t('exportedOk'));
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);if(!data||typeof data!=='object')throw 0;
      foods=validateFoods(data.foods||[]);
      globalIngredients=validateGlobalIngs(data.globalIngredients||[]);schedule=validateSchedule(data.schedule||{});
      manualLocked=validateLockMap(data.manualLocked||{});manualUnlocked=validateLockMap(data.manualUnlocked||{});
      notes=validateNotes(data.notes||{});
      if(data.lang&&T[data.lang])lang=data.lang;
      cleanOrphans();saveFoods();saveSched();saveManual();saveNotes();saveGlobalIngs();safeSet('mp_lang',lang);
      setLang(lang);updateStreak();renderGlobalIngs();showToast(t('importedOk'));
    }catch{showToast(t('importFail'));}e.target.value='';
  };reader.readAsText(file);
}
function clearAllData(){
  if(!confirm(t('resetConfirm')))return;
  foods=[];schedule={};manualLocked={};manualUnlocked={};notes={};shopChecked={};globalIngredients=[];
  saveFoods();saveSched();saveManual();saveNotes();saveShop();saveGlobalIngs();
  renderFoods();renderCal();renderGlobalIngs();updateStreak();selDay=null;
  document.getElementById('detail-area').innerHTML='';
  showToast('✓ Reset done');
}

// ── SWIPE ─────────────────────────────────────────────────────
const calGrid=document.getElementById('cal-grid');
calGrid.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;isSwiping=false;},{passive:true});
calGrid.addEventListener('touchmove',e=>{const dx=Math.abs(e.touches[0].clientX-touchStartX),dy=Math.abs(e.touches[0].clientY-touchStartY);if(dx>dy&&dx>10)isSwiping=true;},{passive:true});
calGrid.addEventListener('touchend',e=>{if(!isSwiping)return;const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)shiftMonth(dx<0?1:-1);isSwiping=false;},{passive:true});

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2500);}

// ── TAB SWITCHING ─────────────────────────────────────────────
function switchTab(tab){
  const tabs=['foods','cal','ingredients','shop','help','settings'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===tab));
  tabs.forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===tab));
  if(tab==='cal')renderCal();
  if(tab==='help')renderHelp();
  if(tab==='shop')generateShoppingList();
  if(tab==='ingredients')renderGlobalIngs();
}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}

load();
</script>
